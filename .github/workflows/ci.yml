name: StableNew CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # Required gate: lint + fast deterministic tests.
  # This job MUST pass. Failures are not masked.
  required:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install pip tools
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest ruff mypy types-requests

    - name: Lint (Ruff) — required
      run: |
        ruff check src

    - name: Run required deterministic smoke gate
      run: |
        python tools/ci/run_required_smoke.py

    - name: Run mypy smoke gate
      run: |
        python tools/ci/run_mypy_smoke.py

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: required-test-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/

  # Optional gate: full suite including GUI (requires Tk/Xvfb) and journey tests.
  # Failures here are reported but do not block merges.
  full-suite:
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system deps for Tk (required for GUI tests)
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk xvfb

    - name: Install pip tools
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-xvfb ruff

    - name: Run full test suite (Xvfb)
      uses: GabrielBB/xvfb-action@v1
      with:
        run: |
          pytest -vv --maxfail=5 --disable-warnings --showlocals

    - name: Upload full test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: full-test-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/
